spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/atify?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}
spring.sql.init.mode=never

jwt.secret=${JWT_SECRET:BuCokGucluBirJwtKey1234567890ZXCvbn}
jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}

music.upload-dir=${MUSIC_UPLOAD_DIR:C:/music/uploads}
music.temp-dir=${MUSIC_TEMP_DIR:C:/music/tmp}
shazam.python-base-url=${SHAZAM_PYTHON_BASE_URL:http://127.0.0.1:5001}

ffprobe.path=${FFPROBE_PATH:ffprobe}
# ffprobe.path=C:/ffmpeg/bin/ffprobe.exe

spring.servlet.multipart.enabled=true
spring.servlet.multipart.resolve-lazily=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Observability
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=atify-backend

jamendo.client-id=${JAMENDO_CLIENT_ID:}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080,http://127.0.0.1:8080}
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:none}
